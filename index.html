<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookmark Workbench</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <section class="identity" aria-label="Overview">
          <p class="kicker">Bookmark Workbench</p>
          <h1 id="clock">--:--</h1>
          <p id="today" class="muted"></p>
        </section>
        <section class="search-wrap">
          <input id="search" type="search" autocomplete="off" spellcheck="false" placeholder="Search title, domain, folder...">
          <div class="search-meta">
            <div id="stats" class="stats"></div>
            <div class="shortcuts" aria-label="Keyboard shortcuts">
              <kbd>/</kbd> Search
              <kbd>Enter</kbd> Open first
              <kbd>Esc</kbd> Clear
            </div>
          </div>
        </section>
      </header>

      <section class="quick-row" aria-label="Pinned domains">
        <div id="domainPills" class="domain-pills"></div>
      </section>

      <section class="workspace">
        <aside class="sidebar" aria-label="Bookmark folders">
          <div class="section-head">
            <span>Folders</span>
            <div class="folder-controls">
              <button id="addFolder" type="button">New</button>
              <button id="clearFilter" type="button">All</button>
            </div>
          </div>
          <nav id="folders" class="folders"></nav>
        </aside>

        <section class="content">
          <div class="section-head content-head">
            <span id="resultTitle">Bookmarks</span>
            <div class="view-controls">
              <button id="addBookmark" type="button">Add</button>
              <button id="densityToggle" type="button" aria-pressed="false">Compact</button>
              <select id="sortMode" aria-label="Sort bookmarks">
                <option value="manual">Manual</option>
                <option value="smart">Recent</option>
                <option value="title">Title</option>
                <option value="domain">Domain</option>
                <option value="folder">Folder</option>
              </select>
            </div>
          </div>
          <div id="bookmarks" class="bookmark-grid"></div>
          <div id="empty" class="empty" hidden>No bookmarks match this view.</div>
        </section>
      </section>
    </main>

    <dialog id="bookmarkDialog" class="bookmark-dialog">
      <form id="bookmarkForm" method="dialog">
        <h2 id="dialogTitle">Edit bookmark</h2>
        <input id="bookmarkId" type="hidden">
        <label>
          <span>Title</span>
          <input id="bookmarkTitle" type="text" autocomplete="off" required>
        </label>
        <label>
          <span>URL</span>
          <input id="bookmarkUrl" type="url" autocomplete="off" required>
        </label>
        <p id="dialogFolder" class="dialog-folder"></p>
        <div class="dialog-actions">
          <button id="deleteBookmark" type="button" class="danger">Delete</button>
          <span class="dialog-spacer"></span>
          <button id="cancelDialog" type="button">Cancel</button>
          <button id="saveBookmark" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="folderDialog" class="bookmark-dialog">
      <form id="folderForm" method="dialog">
        <h2 id="folderDialogTitle">Edit folder</h2>
        <input id="folderId" type="hidden">
        <label>
          <span>Name</span>
          <input id="folderName" type="text" autocomplete="off" required>
        </label>
        <p id="folderDialogPath" class="dialog-folder"></p>
        <div class="dialog-actions">
          <button id="deleteFolder" type="button" class="danger">Delete folder</button>
          <span class="dialog-spacer"></span>
          <button id="cancelFolderDialog" type="button">Cancel</button>
          <button id="saveFolder" type="submit">Save</button>
        </div>
      </form>
    </dialog>
    <script src="app.js"></script>
  </body>
</html>
